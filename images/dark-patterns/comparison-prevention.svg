<svg viewBox="0 0 480 360" xmlns="http://www.w3.org/2000/svg">
<title>Comparison Prevention dark pattern example</title>
<desc>A pricing page listing three plans with different names, billing periods, and included features for each tier, deliberately structured so no two plans can be compared on the same basis.</desc>
<rect width="480" height="360" fill="#F7F5F0"/>
<rect x="20" y="20" width="440" height="40" rx="8" fill="#141210"/>
<text x="40" y="46" font-family="Inter,sans-serif" font-size="16" fill="#F7F5F0" font-weight="700">CloudSuite — Choose a Plan</text>
<rect x="20" y="75" width="130" height="230" rx="8" fill="#ffffff" stroke="#ddd"/>
<text x="35" y="100" font-family="Inter,sans-serif" font-size="12" fill="#141210" font-weight="700">Starter Flex</text>
<text x="35" y="120" font-family="Inter,sans-serif" font-size="10" fill="#666">$8/week</text>
<text x="35" y="145" font-family="Inter,sans-serif" font-size="9" fill="#999">5 projects, 2GB, community support</text>
<rect x="165" y="75" width="130" height="230" rx="8" fill="#ffffff" stroke="#ddd"/>
<text x="180" y="100" font-family="Inter,sans-serif" font-size="12" fill="#141210" font-weight="700">Team Pro Bundle</text>
<text x="180" y="120" font-family="Inter,sans-serif" font-size="10" fill="#666">$149/quarter</text>
<text x="180" y="145" font-family="Inter,sans-serif" font-size="9" fill="#999">Unlimited seats, 50 credits/mo</text>
<rect x="310" y="75" width="150" height="230" rx="8" fill="#ffffff" stroke="#ddd"/>
<text x="325" y="100" font-family="Inter,sans-serif" font-size="12" fill="#141210" font-weight="700">Enterprise Value</text>
<text x="325" y="120" font-family="Inter,sans-serif" font-size="10" fill="#666">$1,290/year (billed annually)</text>
<text x="325" y="145" font-family="Inter,sans-serif" font-size="9" fill="#999">Custom storage tier, priority queue</text>
<rect x="40" y="270" width="400" height="30" rx="15" fill="#B85C3A"/>
<text x="55" y="290" font-family="Inter,sans-serif" font-size="11" fill="#fff" font-weight="700">Different units, terms & features — no apples-to-apples</text>
</svg>
