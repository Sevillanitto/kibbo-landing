<svg viewBox="0 0 480 360" xmlns="http://www.w3.org/2000/svg">
<title>Preselection dark pattern example</title>
<desc>An app permissions screen where data-sharing toggles for marketing and third-party partners are switched on by default, requiring the user to notice and manually turn them off.</desc>
<rect width="480" height="360" fill="#F7F5F0"/>
<rect x="20" y="20" width="440" height="40" rx="8" fill="#141210"/>
<text x="40" y="46" font-family="Inter,sans-serif" font-size="16" fill="#F7F5F0" font-weight="700">ConnectApp — Privacy Settings</text>
<rect x="20" y="75" width="440" height="245" rx="8" fill="#ffffff" stroke="#ddd"/>
<text x="40" y="105" font-family="Inter,sans-serif" font-size="13" fill="#141210">Share activity with friends</text>
<circle cx="420" cy="100" r="10" fill="#ccc"/>
<text x="40" y="145" font-family="Inter,sans-serif" font-size="13" fill="#141210">Share data with marketing partners</text>
<rect x="405" y="132" width="34" height="18" rx="9" fill="#3D6B4F"/>
<circle cx="431" cy="141" r="8" fill="#fff"/>
<text x="40" y="185" font-family="Inter,sans-serif" font-size="13" fill="#141210">Personalized ads based on location</text>
<rect x="405" y="172" width="34" height="18" rx="9" fill="#3D6B4F"/>
<circle cx="431" cy="181" r="8" fill="#fff"/>
<text x="40" y="225" font-family="Inter,sans-serif" font-size="13" fill="#141210">Allow third-party analytics</text>
<rect x="405" y="212" width="34" height="18" rx="9" fill="#3D6B4F"/>
<circle cx="431" cy="221" r="8" fill="#fff"/>
<rect x="40" y="255" width="260" height="30" rx="15" fill="#B85C3A"/>
<text x="55" y="275" font-family="Inter,sans-serif" font-size="11" fill="#fff" font-weight="700">3 of 4 toggles on by default</text>
</svg>
