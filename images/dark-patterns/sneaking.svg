<svg viewBox="0 0 480 360" xmlns="http://www.w3.org/2000/svg">
<title>Sneaking dark pattern example</title>
<desc>A shopping cart with an extra item, such as travel insurance or a warranty, automatically added without the shopper's request, requiring them to notice and remove it manually.</desc>
<rect width="480" height="360" fill="#F7F5F0"/>
<rect x="20" y="20" width="440" height="40" rx="8" fill="#141210"/>
<text x="40" y="46" font-family="Inter,sans-serif" font-size="16" fill="#F7F5F0" font-weight="700">FlyEasy — Your Cart</text>
<rect x="20" y="75" width="440" height="245" rx="8" fill="#ffffff" stroke="#ddd"/>
<text x="40" y="105" font-family="Inter,sans-serif" font-size="14" fill="#141210" font-weight="700">Flight NYC → LON</text>
<text x="400" y="105" font-family="Inter,sans-serif" font-size="14" fill="#141210" text-anchor="end">$342.00</text>
<rect x="35" y="125" width="410" height="45" rx="6" fill="#fdf3ea" stroke="#C8922A"/>
<text x="45" y="145" font-family="Inter,sans-serif" font-size="12" fill="#141210">✓ Flexible Cancellation Protection</text>
<text x="45" y="160" font-family="Inter,sans-serif" font-size="10" fill="#999">Added automatically — remove</text>
<text x="400" y="152" font-family="Inter,sans-serif" font-size="12" fill="#141210" text-anchor="end">$38.00</text>
<line x1="40" y1="195" x2="440" y2="195" stroke="#eee"/>
<text x="40" y="220" font-family="Inter,sans-serif" font-size="15" fill="#141210" font-weight="700">Total</text>
<text x="400" y="220" font-family="Inter,sans-serif" font-size="15" fill="#141210" font-weight="700" text-anchor="end">$380.00</text>
<rect x="40" y="260" width="230" height="30" rx="15" fill="#B85C3A"/>
<text x="55" y="280" font-family="Inter,sans-serif" font-size="11" fill="#fff" font-weight="700">Item you never chose</text>
</svg>
