<svg viewBox="0 0 480 360" xmlns="http://www.w3.org/2000/svg">
<title>Trick Wording dark pattern example</title>
<desc>A marketing preferences checkbox using a confusing double-negative sentence, making it hard to tell whether checking the box opts the user in or out of marketing emails.</desc>
<rect width="480" height="360" fill="#F7F5F0"/>
<rect x="20" y="20" width="440" height="40" rx="8" fill="#141210"/>
<text x="40" y="46" font-family="Inter,sans-serif" font-size="16" fill="#F7F5F0" font-weight="700">HomeGoods Direct — Sign Up</text>
<rect x="20" y="75" width="440" height="180" rx="8" fill="#ffffff" stroke="#ddd"/>
<text x="40" y="110" font-family="Inter,sans-serif" font-size="13" fill="#666">Email:</text>
<rect x="40" y="120" width="380" height="30" rx="4" fill="#f5f5f5" stroke="#ddd"/>
<rect x="40" y="175" width="16" height="16" fill="none" stroke="#141210"/>
<text x="65" y="188" font-family="Inter,sans-serif" font-size="11" fill="#141210">Don't not send me offers I might not be uninterested in</text>
<rect x="40" y="210" width="230" height="30" rx="15" fill="#B85C3A"/>
<text x="55" y="230" font-family="Inter,sans-serif" font-size="11" fill="#fff" font-weight="700">Confusing on purpose</text>
</svg>
