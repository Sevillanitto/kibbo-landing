name = "phishing-detector-auditor"
main = "worker.js"
compatibility_date = "2024-01-01"

# KV namespace for the per-IP daily rate limiter (3 free checks / IP / day)
# and the access codes (code:KIBBO-PHISH-...). Create it first, then paste the
# printed id below:
#   npx wrangler kv namespace create phishing-detector-rate-limit
# (or create it in the Cloudflare dashboard and copy the namespace ID)
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "a95e5b0325844763814f41b1763f6deb"
